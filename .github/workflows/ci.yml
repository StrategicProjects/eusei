name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# evita rodar duas vezes (push + PR) e cancela execuções antigas do mesmo ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-06-15
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Testes
        run: cargo test --locked
      - name: Build (release)
        run: cargo build --release --locked

  release:
    name: empacota & publica (.deb + binário)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-06-15
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Instala cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build release + .deb
        run: |
          cargo build --release --locked
          cargo deb --no-build
      - name: Reúne artefatos
        run: |
          mkdir -p dist
          cp target/release/eusei dist/eusei-linux-x86_64
          cp target/debian/*.deb dist/
          ls -lh dist
      - name: Publica release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/eusei-linux-x86_64
            dist/*.deb
          generate_release_notes: true
