# eusei — snippet de proxy reverso para o nginx do boxdev.
# Instalado em /etc/nginx/snippets/eusei.conf e incluído no server block de
# monitoramento.sepe.pe.gov.br via `include snippets/eusei.conf;`.
#
# O trailing slash em proxy_pass remove o prefixo /eusei/:
#   /eusei/v1/procedimento/...  ->  http://127.0.0.1:18088/v1/procedimento/...
#   /eusei/health               ->  http://127.0.0.1:18088/health

# /eusei sem barra -> redireciona para /eusei/
# absolute_redirect off => Location relativo ("/eusei/"), preservando o https
# do navegador (o TLS é terminado no nginx corporativo à frente).
location = /eusei {
    absolute_redirect off;
    return 301 /eusei/;
}

location /eusei/ {
    proxy_pass http://127.0.0.1:18088/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
}
