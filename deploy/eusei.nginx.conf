# eusei — snippet de proxy reverso para o nginx do servidor.
# Instalado em /etc/nginx/snippets/eusei.conf e incluído no server block de
# do seu domínio via `include snippets/eusei.conf;`.
#
# O trailing slash em proxy_pass remove o prefixo /eusei/:
#   /eusei/v1/procedimento/...  ->  http://127.0.0.1:18088/v1/procedimento/...
#   /eusei/health               ->  http://127.0.0.1:18088/health

# /eusei sem barra -> redireciona para /eusei/
# absolute_redirect off => Location relativo ("/eusei/"), preservando o https
# do navegador (o TLS é terminado no nginx corporativo à frente).
location = /eusei {
    absolute_redirect off;
    return 301 /eusei/;
}

# Endpoint SSE (progresso ao vivo dos andamentos): exige buffering desligado
# (senão o nginx segura os eventos até o fim) e um read timeout mais folgado.
# Precede o `location /eusei/` por ser um prefixo mais específico.
location /eusei/v1/andamentos/stream {
    proxy_pass http://127.0.0.1:18088/v1/andamentos/stream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
}

location /eusei/ {
    proxy_pass http://127.0.0.1:18088/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
}
